<svg width="300" height="420" viewBox="0 0 300 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
    <stop offset="0%" stop-color="#040810"/>
    <stop offset="60%" stop-color="#06100c" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#030709"/>
  </linearGradient>
  <linearGradient id="dg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#ffcc00" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#ffcc00" stop-opacity="0.05"/>
  </linearGradient>
  <radialGradient id="orb" cx="50%" cy="48%" r="45%">
    <stop offset="0%" stop-color="#ffcc00" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#ffcc00" stop-opacity="0"/>
  </radialGradient>
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow2" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="cp"><rect width="300" height="420" rx="14"/></clipPath>
</defs>

<g clip-path="url(#cp)">
<!-- background -->
<rect width="300" height="420" fill="url(#bg)"/>

<!-- subtle hex grid overlay -->
<g opacity="0.055" stroke="#ffcc00" stroke-width="0.6" fill="none">
  <line x1="0" y1="0" x2="300" y2="0"/><line x1="0" y1="52" x2="300" y2="52"/><line x1="0" y1="104" x2="300" y2="104"/><line x1="0" y1="156" x2="300" y2="156"/><line x1="0" y1="208" x2="300" y2="208"/><line x1="0" y1="260" x2="300" y2="260"/><line x1="0" y1="312" x2="300" y2="312"/><line x1="0" y1="364" x2="300" y2="364"/><line x1="0" y1="416" x2="300" y2="416"/>
  <line x1="0" y1="0" x2="0" y2="420"/><line x1="52" y1="0" x2="52" y2="420"/><line x1="104" y1="0" x2="104" y2="420"/><line x1="156" y1="0" x2="156" y2="420"/><line x1="208" y1="0" x2="208" y2="420"/><line x1="260" y1="0" x2="260" y2="420"/>
</g>

<!-- glow orb -->
<ellipse cx="150" cy="200" rx="130" ry="110" fill="url(#orb)"/>

<!-- dino area gradient fill -->
<ellipse cx="150" cy="200" rx="115" ry="95" fill="url(#dg)" opacity="0.6"/>


<!-- body large -->
<path d="M 95,260 C 90,225 100,200 130,188 C 155,178 185,180 205,195
         C 222,208 228,232 224,260 C 220,282 204,296 180,300
         C 152,305 115,300 100,285 C 90,274 96,270 95,260 Z"
      fill="#1e1200" stroke="#ffcc00" stroke-width="2" filter="url(#glow)"/>
<!-- neck -->
<path d="M 202,197 C 216,178 224,162 222,150 C 221,144 227,145 229,151
         C 233,166 226,186 212,204 Z"
      fill="#1e1200" stroke="#ffcc00" stroke-width="1.8" filter="url(#glow)"/>
<!-- head -->
<ellipse cx="226" cy="142" rx="22" ry="14"
         fill="#241500" stroke="#ffcc00" stroke-width="2" filter="url(#glow)"/>
<!-- snout - elongated horse-like -->
<path d="M 240,138 C 258,130 276,128 284,133 C 288,136 286,142 280,143 L 242,146 Z"
      fill="#1a0f00" stroke="#ffcc00" stroke-width="1.5" filter="url(#glow)"/>
<!-- nostril -->
<ellipse cx="272" cy="138" rx="3" ry="2" fill="#ffcc00" opacity="0.4"/>
<!-- eye -->
<circle cx="230" cy="138" r="5" fill="#080400"/>
<circle cx="230" cy="138" r="3" fill="#ffcc00" opacity="0.88" filter="url(#glow)"/>
<circle cx="231" cy="137" r="1" fill="white"/>
<!-- brow ridge -->
<path d="M 222,132 C 228,128 236,128 242,131" fill="none" stroke="#ffcc00" stroke-width="1.5" opacity="0.5"/>
<!-- small arm (forelimb) -->
<path d="M 200,230 C 208,244 210,260 206,268 C 202,274 197,272 196,266
         C 195,258 198,244 200,230 Z"
      fill="#1a1000" stroke="#ffcc00" stroke-width="1.5" filter="url(#glow)"/>
<!-- THUMB SPIKE (iguanodon's most distinctive feature) -->
<path d="M 207,264 C 218,258 228,256 232,260 C 234,263 232,267 226,268
         C 218,269 210,267 207,264 Z"
      fill="#161000" stroke="#ffcc00" stroke-width="1.6" filter="url(#glow)"/>
<path d="M 208,262 C 222,250 238,246 244,250"
      fill="none" stroke="#ffcc00" stroke-width="1" opacity="0.5"/>
<!-- back legs (large, powerful) -->
<path d="M 108,295 L 95,345 C 93,354 86,358 80,356 L 78,348 C 83,350 87,347 89,340 L 103,290 Z"
      fill="#1a1000" stroke="#ffcc00" stroke-width="1.8" filter="url(#glow)"/>
<path d="M 155,302 L 148,348 C 147,356 140,360 134,358 L 133,350 C 138,351 141,348 142,342 L 150,296 Z"
      fill="#1a1000" stroke="#ffcc00" stroke-width="1.8" filter="url(#glow)"/>
<!-- feet with claws -->
<path d="M 76,350 C 66,350 54,354 48,359 L 51,364 C 58,360 68,357 78,357 Z"
      fill="#141000" stroke="#ffcc00" stroke-width="1.4" filter="url(#glow)"/>
<path d="M 132,354 C 122,354 110,358 104,363 L 107,368 C 114,364 124,361 134,361 Z"
      fill="#141000" stroke="#ffcc00" stroke-width="1.4" filter="url(#glow)"/>
<!-- claw details -->
<line x1="52" y1="361" x2="46" y2="368" stroke="#ffcc00" stroke-width="1.2" opacity="0.6"/>
<line x1="58" y1="363" x2="53" y2="370" stroke="#ffcc00" stroke-width="1.2" opacity="0.6"/>
<line x1="108" y1="365" x2="102" y2="372" stroke="#ffcc00" stroke-width="1.2" opacity="0.6"/>
<line x1="114" y1="367" x2="109" y2="374" stroke="#ffcc00" stroke-width="1.2" opacity="0.6"/>
<!-- tail -->
<path d="M 96,262 C 76,265 56,260 36,250 C 27,246 25,253 31,258
         C 48,267 68,272 94,269 Z"
      fill="#1a1000" stroke="#ffcc00" stroke-width="1.8" filter="url(#glow)"/>
<!-- scales/texture lines on body -->
<g fill="none" stroke="#ffcc00" stroke-width="0.6" opacity="0.2">
  <path d="M 130,210 C 145,205 165,205 180,210"/>
  <path d="M 120,230 C 140,224 170,224 190,230"/>
  <path d="M 115,252 C 138,246 172,246 195,252"/>
  <path d="M 118,272 C 140,268 170,268 190,272"/>
</g>



<!-- encryption lock decoration -->
<g opacity="0.18" stroke="#ffcc00" fill="none" stroke-width="1">
  <rect x="233" y="298" width="22" height="18" rx="3"/>
  <path d="M 237,298 C 237,292 239,289 244,289 C 249,289 251,292 251,298"/>
  <rect x="242" y="303" width="4" height="6" rx="2" fill="#ffcc00" fill-opacity="0.3"/>
</g>


<!-- outer border glow -->
<rect width="298" height="418" x="1" y="1" rx="13" fill="none"
      stroke="#ffcc00" stroke-width="2.5" opacity="0.85" filter="url(#glow)"/>
<!-- inner border thin -->
<rect width="290" height="410" x="5" y="5" rx="10" fill="none"
      stroke="#ffcc00" stroke-width="0.6" opacity="0.25"/>

<!-- mission badge top-right -->
<rect x="220" y="12" width="68" height="26" rx="7"
      fill="#ffcc00" fill-opacity="0.18" stroke="#ffcc00" stroke-width="1.2" filter="url(#glow)"/>
<text x="254" y="29" fill="#ffcc00" font-size="12" font-family="'Courier New',monospace"
      text-anchor="middle" font-weight="bold">M.10</text>

<!-- feature badge top-left -->
<rect x="12" y="12" width="72" height="26" rx="7"
      fill="#ffcc00" fill-opacity="0.12" stroke="#ffcc00" stroke-width="1"/>
<text x="48" y="29" fill="#ffcc00" font-size="10" font-family="'Courier New',monospace"
      text-anchor="middle">🔐 ENC</text>

<!-- corner brackets -->
<path d="M13,42 L13,14 L41,14" fill="none" stroke="#ffcc00" stroke-width="1.8" opacity="0.55"/>
<path d="M287,42 L287,14 L259,14" fill="none" stroke="#ffcc00" stroke-width="1.8" opacity="0.55"/>
<path d="M13,378 L13,406 L41,406" fill="none" stroke="#ffcc00" stroke-width="1.8" opacity="0.55"/>
<path d="M287,378 L287,406 L259,406" fill="none" stroke="#ffcc00" stroke-width="1.8" opacity="0.55"/>

<!-- rarity dots -->
<g fill="#ffcc00" opacity="0.7">
<text x="150" y="354" fill="#ffcc00" font-size="9" font-family="monospace" text-anchor="middle" opacity="0.9" letter-spacing="2">✦ LEGENDARY ✦</text>
</g>

<!-- bottom name plate -->
<rect x="10" y="362" width="280" height="46" rx="9"
      fill="#ffcc00" fill-opacity="0.13" stroke="#ffcc00" stroke-width="1.2"/>
<text x="150" y="378" fill="#ffcc00" font-size="9" font-family="'Courier New',monospace"
      text-anchor="middle" opacity="0.75" letter-spacing="2">CRETÁCICO TEMP.</text>
<text x="150" y="398" fill="white" font-size="17" font-family="'Courier New',monospace"
      text-anchor="middle" font-weight="bold" letter-spacing="1">IGUANODÓN</text>
</g>
</svg>