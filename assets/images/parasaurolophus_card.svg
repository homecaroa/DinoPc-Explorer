<svg width="300" height="420" viewBox="0 0 300 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
    <stop offset="0%" stop-color="#040810"/>
    <stop offset="60%" stop-color="#06100c" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#030709"/>
  </linearGradient>
  <linearGradient id="dg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#bb55ff" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#bb55ff" stop-opacity="0.05"/>
  </linearGradient>
  <radialGradient id="orb" cx="50%" cy="48%" r="45%">
    <stop offset="0%" stop-color="#bb55ff" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#bb55ff" stop-opacity="0"/>
  </radialGradient>
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow2" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="cp"><rect width="300" height="420" rx="14"/></clipPath>
</defs>

<g clip-path="url(#cp)">
<!-- background -->
<rect width="300" height="420" fill="url(#bg)"/>

<!-- subtle hex grid overlay -->
<g opacity="0.055" stroke="#bb55ff" stroke-width="0.6" fill="none">
  <line x1="0" y1="0" x2="300" y2="0"/><line x1="0" y1="52" x2="300" y2="52"/><line x1="0" y1="104" x2="300" y2="104"/><line x1="0" y1="156" x2="300" y2="156"/><line x1="0" y1="208" x2="300" y2="208"/><line x1="0" y1="260" x2="300" y2="260"/><line x1="0" y1="312" x2="300" y2="312"/><line x1="0" y1="364" x2="300" y2="364"/><line x1="0" y1="416" x2="300" y2="416"/>
  <line x1="0" y1="0" x2="0" y2="420"/><line x1="52" y1="0" x2="52" y2="420"/><line x1="104" y1="0" x2="104" y2="420"/><line x1="156" y1="0" x2="156" y2="420"/><line x1="208" y1="0" x2="208" y2="420"/><line x1="260" y1="0" x2="260" y2="420"/>
</g>

<!-- glow orb -->
<ellipse cx="150" cy="200" rx="130" ry="110" fill="url(#orb)"/>

<!-- dino area gradient fill -->
<ellipse cx="150" cy="200" rx="115" ry="95" fill="url(#dg)" opacity="0.6"/>


<!-- body -->
<path d="M 80,255 C 80,218 96,198 130,190 C 158,183 185,185 205,198
         C 222,210 228,232 225,256 C 222,276 208,288 185,292
         C 158,296 120,293 100,280 C 84,270 80,265 80,255 Z"
      fill="#1a0830" stroke="#bb55ff" stroke-width="2" filter="url(#glow)"/>
<!-- neck -->
<path d="M 205,200 C 218,182 224,168 222,158 C 221,152 226,152 228,157
         C 232,170 228,188 216,206 Z"
      fill="#1a0830" stroke="#bb55ff" stroke-width="1.8" filter="url(#glow)"/>
<!-- head -->
<ellipse cx="224" cy="150" rx="20" ry="13"
         fill="#200a3a" stroke="#bb55ff" stroke-width="2" filter="url(#glow)"/>
<!-- duck bill -->
<path d="M 238,147 C 256,140 272,139 278,143 C 281,146 278,152 272,152 L 240,153 Z"
      fill="#160826" stroke="#bb55ff" stroke-width="1.5" filter="url(#glow)"/>
<!-- CREST - long backward-pointing hollow tube -->
<path d="M 214,140 C 222,125 238,112 256,106 C 268,102 278,104 282,110
         C 284,114 282,120 276,122 C 264,124 248,120 234,126
         C 220,132 210,144 208,155 L 204,150
         C 206,140 216,128 230,122 C 244,116 264,118 274,116
         C 278,115 278,112 276,111 C 270,108 256,110 244,115
         C 230,121 218,135 210,148 Z"
      fill="#140628" stroke="#bb55ff" stroke-width="1.8" filter="url(#glow)"/>
<!-- eye -->
<circle cx="226" cy="147" r="4.5" fill="#080210"/>
<circle cx="226" cy="147" r="2.8" fill="#bb55ff" opacity="0.88" filter="url(#glow)"/>
<circle cx="227" cy="146" r="0.9" fill="white"/>
<!-- arm (small forelimb) -->
<path d="M 185,240 C 190,256 186,268 180,272 C 175,274 172,270 174,264 C 177,256 180,246 185,240 Z"
      fill="#180730" stroke="#bb55ff" stroke-width="1.4"/>
<!-- back legs -->
<path d="M 102,286 L 92,330 C 90,338 84,342 78,340 L 76,333 C 80,334 84,332 86,326 L 96,282 Z"
      fill="#160628" stroke="#bb55ff" stroke-width="1.6" filter="url(#glow)"/>
<path d="M 140,294 L 134,334 C 133,341 128,345 122,343 L 121,336 C 125,337 128,334 129,328 L 135,288 Z"
      fill="#160628" stroke="#bb55ff" stroke-width="1.6" filter="url(#glow)"/>
<!-- feet -->
<path d="M 74,336 C 66,336 56,340 52,344 L 54,348 C 60,345 70,342 78,342 Z"
      fill="#120524" stroke="#bb55ff" stroke-width="1.3" filter="url(#glow)"/>
<path d="M 120,340 C 112,340 102,344 98,348 L 100,352 C 106,349 116,346 124,346 Z"
      fill="#120524" stroke="#bb55ff" stroke-width="1.3" filter="url(#glow)"/>
<!-- tail -->
<path d="M 80,258 C 62,260 44,256 28,248 C 20,244 18,250 24,254
         C 38,262 56,266 78,264 Z"
      fill="#180730" stroke="#bb55ff" stroke-width="1.8" filter="url(#glow)"/>



<!-- zip/compress arrows decoration -->
<g opacity="0.16" stroke="#bb55ff" fill="none" stroke-width="1.2">
  <path d="M 50,305 L 62,305 L 56,299 M 56,311 L 62,305"/>
  <path d="M 245,305 L 233,305 L 239,299 M 239,311 L 233,305"/>
  <line x1="68" y1="305" x2="232" y2="305"/>
</g>


<!-- outer border glow -->
<rect width="298" height="418" x="1" y="1" rx="13" fill="none"
      stroke="#bb55ff" stroke-width="2.5" opacity="0.85" filter="url(#glow)"/>
<!-- inner border thin -->
<rect width="290" height="410" x="5" y="5" rx="10" fill="none"
      stroke="#bb55ff" stroke-width="0.6" opacity="0.25"/>

<!-- mission badge top-right -->
<rect x="220" y="12" width="68" height="26" rx="7"
      fill="#bb55ff" fill-opacity="0.18" stroke="#bb55ff" stroke-width="1.2" filter="url(#glow)"/>
<text x="254" y="29" fill="#bb55ff" font-size="12" font-family="'Courier New',monospace"
      text-anchor="middle" font-weight="bold">M.09</text>

<!-- feature badge top-left -->
<rect x="12" y="12" width="72" height="26" rx="7"
      fill="#bb55ff" fill-opacity="0.12" stroke="#bb55ff" stroke-width="1"/>
<text x="48" y="29" fill="#bb55ff" font-size="10" font-family="'Courier New',monospace"
      text-anchor="middle">📦 ZIP</text>

<!-- corner brackets -->
<path d="M13,42 L13,14 L41,14" fill="none" stroke="#bb55ff" stroke-width="1.8" opacity="0.55"/>
<path d="M287,42 L287,14 L259,14" fill="none" stroke="#bb55ff" stroke-width="1.8" opacity="0.55"/>
<path d="M13,378 L13,406 L41,406" fill="none" stroke="#bb55ff" stroke-width="1.8" opacity="0.55"/>
<path d="M287,378 L287,406 L259,406" fill="none" stroke="#bb55ff" stroke-width="1.8" opacity="0.55"/>

<!-- rarity dots -->
<g fill="#bb55ff" opacity="0.7">
<circle cx="118" cy="350" r="4"/><circle cx="134" cy="350" r="4"/><circle cx="150" cy="350" r="4"/><circle cx="166" cy="350" r="4"/><circle cx="182" cy="350" r="4"/>
</g>

<!-- bottom name plate -->
<rect x="10" y="362" width="280" height="46" rx="9"
      fill="#bb55ff" fill-opacity="0.13" stroke="#bb55ff" stroke-width="1.2"/>
<text x="150" y="378" fill="#bb55ff" font-size="9" font-family="'Courier New',monospace"
      text-anchor="middle" opacity="0.75" letter-spacing="2">CRETÁCICO TARDÍO</text>
<text x="150" y="398" fill="white" font-size="17" font-family="'Courier New',monospace"
      text-anchor="middle" font-weight="bold" letter-spacing="1">PARASAUROLOFUS</text>
</g>
</svg>