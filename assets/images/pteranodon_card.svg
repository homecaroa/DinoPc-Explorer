<svg width="300" height="420" viewBox="0 0 300 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
    <stop offset="0%" stop-color="#040810"/>
    <stop offset="60%" stop-color="#06100c" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#030709"/>
  </linearGradient>
  <linearGradient id="dg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#4488ff" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#4488ff" stop-opacity="0.05"/>
  </linearGradient>
  <radialGradient id="orb" cx="50%" cy="48%" r="45%">
    <stop offset="0%" stop-color="#4488ff" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#4488ff" stop-opacity="0"/>
  </radialGradient>
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow2" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="cp"><rect width="300" height="420" rx="14"/></clipPath>
</defs>

<g clip-path="url(#cp)">
<!-- background -->
<rect width="300" height="420" fill="url(#bg)"/>

<!-- subtle hex grid overlay -->
<g opacity="0.055" stroke="#4488ff" stroke-width="0.6" fill="none">
  <line x1="0" y1="0" x2="300" y2="0"/><line x1="0" y1="52" x2="300" y2="52"/><line x1="0" y1="104" x2="300" y2="104"/><line x1="0" y1="156" x2="300" y2="156"/><line x1="0" y1="208" x2="300" y2="208"/><line x1="0" y1="260" x2="300" y2="260"/><line x1="0" y1="312" x2="300" y2="312"/><line x1="0" y1="364" x2="300" y2="364"/><line x1="0" y1="416" x2="300" y2="416"/>
  <line x1="0" y1="0" x2="0" y2="420"/><line x1="52" y1="0" x2="52" y2="420"/><line x1="104" y1="0" x2="104" y2="420"/><line x1="156" y1="0" x2="156" y2="420"/><line x1="208" y1="0" x2="208" y2="420"/><line x1="260" y1="0" x2="260" y2="420"/>
</g>

<!-- glow orb -->
<ellipse cx="150" cy="200" rx="130" ry="110" fill="url(#orb)"/>

<!-- dino area gradient fill -->
<ellipse cx="150" cy="200" rx="115" ry="95" fill="url(#dg)" opacity="0.6"/>


<!-- left wing membrane -->
<path d="M 18,252 C 42,220 78,196 118,200 C 124,201 128,208 126,218
         L 108,228 C 88,218 60,220 38,248 Z"
      fill="#101e40" stroke="#4488ff" stroke-width="1.8" filter="url(#glow)"/>
<!-- right wing membrane -->
<path d="M 282,252 C 258,220 222,196 182,200 C 176,201 172,208 174,218
         L 192,228 C 212,218 240,220 262,248 Z"
      fill="#101e40" stroke="#4488ff" stroke-width="1.8" filter="url(#glow)"/>
<!-- wing finger spars (left) -->
<line x1="118" y1="204" x2="22" y2="240" stroke="#4488ff" stroke-width="1" opacity="0.45"/>
<line x1="115" y1="208" x2="40" y2="250" stroke="#4488ff" stroke-width="0.8" opacity="0.3"/>
<line x1="112" y1="214" x2="60" y2="256" stroke="#4488ff" stroke-width="0.6" opacity="0.2"/>
<!-- wing finger spars (right) -->
<line x1="182" y1="204" x2="278" y2="240" stroke="#4488ff" stroke-width="1" opacity="0.45"/>
<line x1="185" y1="208" x2="260" y2="250" stroke="#4488ff" stroke-width="0.8" opacity="0.3"/>
<line x1="188" y1="214" x2="240" y2="256" stroke="#4488ff" stroke-width="0.6" opacity="0.2"/>
<!-- body -->
<ellipse cx="150" cy="208" rx="34" ry="19"
         fill="#162850" stroke="#4488ff" stroke-width="2" filter="url(#glow)"/>
<!-- neck -->
<path d="M 168,203 C 180,190 196,183 208,185 C 213,186 211,192 206,194 L 170,212 Z"
      fill="#162850" stroke="#4488ff" stroke-width="1.6" filter="url(#glow)"/>
<!-- head -->
<ellipse cx="218" cy="185" rx="16" ry="10"
         fill="#1a3060" stroke="#4488ff" stroke-width="1.8" filter="url(#glow)"/>
<!-- upper beak -->
<path d="M 228,181 C 244,175 262,172 270,175 C 273,177 271,181 267,182 L 230,185 Z"
      fill="#0e1e3a" stroke="#4488ff" stroke-width="1.4" filter="url(#glow)"/>
<!-- lower beak -->
<path d="M 228,188 C 242,186 258,185 266,187 L 264,192 C 252,190 238,190 228,190 Z"
      fill="#0e1e3a" stroke="#4488ff" stroke-width="1"/>
<!-- head crest (long backward-pointing) -->
<path d="M 208,178 C 226,162 252,153 268,157 C 272,158 270,164 264,165
         C 248,163 226,170 210,184 Z"
      fill="#0c1830" stroke="#4488ff" stroke-width="1.8" opacity="0.95" filter="url(#glow)"/>
<!-- eye -->
<circle cx="214" cy="182" r="4" fill="#040c1a"/>
<circle cx="214" cy="182" r="2.4" fill="#4488ff" opacity="0.9" filter="url(#glow)"/>
<circle cx="215" cy="181" r="0.8" fill="white"/>
<!-- legs hanging down -->
<line x1="144" y1="224" x2="136" y2="256" stroke="#4488ff" stroke-width="2.2" opacity="0.6"/>
<line x1="156" y1="224" x2="164" y2="256" stroke="#4488ff" stroke-width="2.2" opacity="0.6"/>
<line x1="136" y1="256" x2="127" y2="264" stroke="#4488ff" stroke-width="1.6" opacity="0.6"/>
<line x1="136" y1="256" x2="133" y2="266" stroke="#4488ff" stroke-width="1.6" opacity="0.6"/>
<line x1="164" y1="256" x2="173" y2="264" stroke="#4488ff" stroke-width="1.6" opacity="0.6"/>
<line x1="164" y1="256" x2="167" y2="266" stroke="#4488ff" stroke-width="1.6" opacity="0.6"/>



<!-- network nodes decorative -->
<g opacity="0.18" stroke="#4488ff" stroke-width="0.8" fill="#4488ff">
  <circle cx="52" cy="300" r="3"/>
  <circle cx="248" cy="300" r="3"/>
  <circle cx="150" cy="330" r="3"/>
  <line x1="52" y1="300" x2="150" y2="330"/>
  <line x1="248" y1="300" x2="150" y2="330"/>
</g>


<!-- outer border glow -->
<rect width="298" height="418" x="1" y="1" rx="13" fill="none"
      stroke="#4488ff" stroke-width="2.5" opacity="0.85" filter="url(#glow)"/>
<!-- inner border thin -->
<rect width="290" height="410" x="5" y="5" rx="10" fill="none"
      stroke="#4488ff" stroke-width="0.6" opacity="0.25"/>

<!-- mission badge top-right -->
<rect x="220" y="12" width="68" height="26" rx="7"
      fill="#4488ff" fill-opacity="0.18" stroke="#4488ff" stroke-width="1.2" filter="url(#glow)"/>
<text x="254" y="29" fill="#4488ff" font-size="12" font-family="'Courier New',monospace"
      text-anchor="middle" font-weight="bold">M.07</text>

<!-- feature badge top-left -->
<rect x="12" y="12" width="72" height="26" rx="7"
      fill="#4488ff" fill-opacity="0.12" stroke="#4488ff" stroke-width="1"/>
<text x="48" y="29" fill="#4488ff" font-size="10" font-family="'Courier New',monospace"
      text-anchor="middle">🌐 RED</text>

<!-- corner brackets -->
<path d="M13,42 L13,14 L41,14" fill="none" stroke="#4488ff" stroke-width="1.8" opacity="0.55"/>
<path d="M287,42 L287,14 L259,14" fill="none" stroke="#4488ff" stroke-width="1.8" opacity="0.55"/>
<path d="M13,378 L13,406 L41,406" fill="none" stroke="#4488ff" stroke-width="1.8" opacity="0.55"/>
<path d="M287,378 L287,406 L259,406" fill="none" stroke="#4488ff" stroke-width="1.8" opacity="0.55"/>

<!-- rarity dots -->
<g fill="#4488ff" opacity="0.7">
<circle cx="131" cy="350" r="4"/><circle cx="150" cy="350" r="4"/><circle cx="169" cy="350" r="4"/>
</g>

<!-- bottom name plate -->
<rect x="10" y="362" width="280" height="46" rx="9"
      fill="#4488ff" fill-opacity="0.13" stroke="#4488ff" stroke-width="1.2"/>
<text x="150" y="378" fill="#4488ff" font-size="9" font-family="'Courier New',monospace"
      text-anchor="middle" opacity="0.75" letter-spacing="2">CRETÁCICO TARDÍO</text>
<text x="150" y="398" fill="white" font-size="17" font-family="'Courier New',monospace"
      text-anchor="middle" font-weight="bold" letter-spacing="1">PTERANODÓN</text>
</g>
</svg>